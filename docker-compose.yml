services:
  postgres:
    image: postgres:16-alpine
    container_name: triagem-postgres
    environment:
      POSTGRES_DB: triagem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: triagem-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_NAME: triagem
      DB_USER: postgres
      DB_PASS: postgres
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
