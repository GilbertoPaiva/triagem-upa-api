spring.application.name=triagem-api
server.port=8080

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:triagem}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

triagem.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://triagem.gilbertopaiva.me}
